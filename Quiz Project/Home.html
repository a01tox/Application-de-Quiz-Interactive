<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Quiz - Welcome</title>
    <meta name="description" content="Test your frontend skills with our interactive HTML, CSS, Javascript, and Accessibility quizzes.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="container global-container">
        <div class="top-header">
            <div class="header-left" id="active-subject">
            </div>
            

        </div>

        <div id="home-view" class="view-section">
            <div class="content-split">
                <header class="left-pane">
                    <h1>Welcome to the <span>Frontend Quiz!</span></h1>
                    <p class="sub-header">Pick a subject to get started.</p>
                </header>

                <nav class="right-pane">
                    <button class="quiz-card" data-subject="html">
                        <div class="icon-wrapper html-icon">
                            <img src="image/icon/html icon.png" alt="HTML Icon">
                        </div>
                        <span>HTML</span>
                    </button>

                    <button class="quiz-card" data-subject="css">
                        <div class="icon-wrapper css-icon">
                            <img src="image/icon/css icon.png" alt="CSS Icon">
                        </div>
                        <span>CSS</span>
                    </button>

                    <button class="quiz-card" data-subject="javascript">
                        <div class="icon-wrapper js-icon">
                            <img src="image/icon/js icon.png" alt="Javascript Icon">
                        </div>
                        <span>Javascript</span>
                    </button>

                    <button class="quiz-card" data-subject="accessibility">
                        <div class="icon-wrapper accessibility-icon">
                            <img src="image/icon/accessibility icon.png" alt="Accessibility Icon">
                        </div>
                        <span>Accessibility</span>
                    </button>
                </nav>
            </div>
        </div>

        <div id="quiz-view" class="view-section hidden">
            <div class="content-split">
                <div class="left-pane quiz-left">
                    <div class="question-info">
                        <p class="question-counter">Question <span id="current-question-num">1</span> of 10</p>
                        <h2 id="question-text" class="question-prompt">Question goes here?</h2>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar-fill" id="progress-bar"></div>
                    </div>
                </div>

                <div class="right-pane quiz-right">
                    <div class="options-container" id="options-container">
                        <!-- Options generated by JS -->
                    </div>
                    <button id="submit-btn" class="submit-action-btn">Submit Answer</button>
                    <div id="error-message" class="error-msg hidden">
                        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M20 5C11.7157 5 5 11.7157 5 20C5 28.2843 11.7157 35 20 35C28.2843 35 35 28.2843 35 20C35 11.7157 28.2843 5 20 5Z" fill="#EE5454"/>
                            <path d="M24.2426 15.7574L15.7574 24.2426M15.7574 15.7574L24.2426 24.2426" stroke="white" stroke-width="3" stroke-linecap="round"/>
                        </svg>
                        <span class="error-text">Please select an answer</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="results-view" class="view-section hidden">
            <div class="content-split">
                <div class="left-pane results-left">
                    <h1>Quiz completed <span>You scored...</span></h1>
                </div>

                <div class="right-pane results-right">
                    <div class="score-card">
                        <div class="active-subject-header" id="result-subject-header">
                            <!-- Injected by JS -->
                        </div>
                        <p class="final-score" id="final-score">8</p>
                        <p class="total-score">out of 10</p>
                    </div>
                    <button id="restart-btn" class="submit-action-btn">Play Again</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
